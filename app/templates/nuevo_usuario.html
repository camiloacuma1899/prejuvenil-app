<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Nuevo Usuario</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static',
          filename='css/style.css') }}">

</head>

<body>

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-6">

            <div class="card-modern p-5">

                <h1 class="page-title mb-4">

                    Nuevo Usuario

                </h1>

                <form method="POST">

    <div class="row">

        <div class="col-md-6 mb-4">

            <label class="form-label fw-bold">

                Nombres

            </label>

            <input type="text"
                   name="nombres"
                   class="form-control form-control-lg">

        </div>

        <div class="col-md-6 mb-4">

            <label class="form-label fw-bold">

                Apellidos

            </label>

            <input type="text"
                   name="apellidos"
                   class="form-control form-control-lg">

        </div>

    </div>

    <div class="mb-4">

        <label class="form-label fw-bold">

            Correo Electrónico

        </label>

        <input type="email"
               name="correo"
               class="form-control form-control-lg">

    </div>

    <div class="mb-4">

        <label class="form-label fw-bold">

            Teléfono

        </label>

        <input type="text"
               name="telefono"
               class="form-control form-control-lg">

    </div>

    <hr class="my-4">

    <div class="mb-4">

        <label class="form-label fw-bold">

            Usuario

        </label>

        <input type="text"
               name="username"
               class="form-control form-control-lg"
               required>

    </div>

    <div class="mb-4">

        <label class="form-label fw-bold">

            Contraseña

        </label>

        <input type="password"
               name="password"
               class="form-control form-control-lg"
               required>

    </div>

    <div class="mb-4">

        <label class="form-label fw-bold">

            Rol

        </label>

        <select name="rol"
                class="form-select form-select-lg">

            <option value="joven">

                Joven

            </option>

            <option value="coordinador">

                Coordinador

            </option>

        </select>

    </div>

    <div class="d-flex gap-2">

        <a href="{{ url_for('main.usuarios') }}"
           class="btn btn-secondary">

            Cancelar

        </a>

        <button type="submit"
                class="btn btn-modern btn-rojo">

            Crear Usuario

        </button>

    </div>

</form>
            </div>

        </div>

    </div>

</div>

</body>

</html>
