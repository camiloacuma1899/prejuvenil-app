<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>{{ foto.titulo }}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container mt-5">

    <div class="card-modern p-4">

        <div class="text-center">

            <img src="{{ url_for('static', filename='galeria/' + foto.archivo) }}"
                 class="img-fluid rounded shadow"
                 style="max-height:700px;">

        </div>

        <div class="mt-4">

            <h2>

                {{ foto.titulo }}

            </h2>

            <p class="text-muted">

                {{ foto.fecha.strftime('%d/%m/%Y') }}

            </p>

        </div>

        <hr>

       <hr>

<a href="{{ url_for('main.galeria') }}"
   class="btn btn-modern btn-gris">

    <i class="bi bi-arrow-left"></i>

    Volver

</a>

<a href="{{ url_for('main.eliminar_foto', id=foto.id) }}"
   class="btn btn-danger"
   onclick="return confirm('¿Eliminar esta fotografía?')">

    <i class="bi bi-trash-fill"></i>

    Eliminar

</a>

    </div>

</div>

</body>

</html>
