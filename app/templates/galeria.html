<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Galería</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container py-5">

    <!-- CABECERA -->

    <div class="card-modern p-4 mb-5">

        <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3">

            <div>

                <h1 class="page-title mb-2">

                    📸 Galería del Grupo

                </h1>

                <p class="text-muted mb-0">

                    Recuerdos, encuentros y momentos especiales del grupo prejuvenil

                </p>

            </div>

            <div class="d-flex gap-3 flex-wrap">

    {% if current_user.rol == 'coordinador' %}

    <a href="{{ url_for('main.subir_foto') }}"
       class="gallery-action-btn upload-btn">

        <span>

            ⬆️

        </span>

        Subir Foto

    </a>

    {% endif %}

    <a href="/"
       class="gallery-action-btn back-btn">

        <span>

            ←

        </span>

        Inicio

    </a>

</div>
    </div>

    <!-- GALERIA -->

    <div class="gallery-grid">

        {% for foto in fotos %}

        <div class="gallery-item">

            <div class="gallery-card">

                <!-- IMAGEN -->

                <a href="{{ url_for('main.ver_foto', id=foto.id) }}">

                    <img src="{{ url_for('static', filename='galeria/' + foto.archivo) }}"
                         class="gallery-image">

                </a>

                <!-- INFO -->

                <div class="gallery-info">

                    <div class="gallery-title">

                        {{ foto.titulo }}

                    </div>

                    <small class="text-muted">

                        {{ foto.fecha.strftime('%d/%m/%Y') }}

                    </small>

                </div>

            </div>

        </div>

        {% endfor %}

    </div>

</div>

</body>

</html>
