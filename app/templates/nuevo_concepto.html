<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Nuevo Concepto</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static',
          filename='css/style.css') }}">

</head>

<body>

<div class="container py-5">

    <!-- HEADER -->

    <div class="card-modern p-4 mb-4">

        <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3">

            <div>

                <span class="section-badge">

                    🧾 Finanzas

                </span>

                <h1 class="page-title mt-3 mb-2">

                    Nuevo Concepto

                </h1>

                <p class="text-muted mb-0">

                    Crear un nuevo concepto financiero para el grupo

                </p>

            </div>

            <a href="{{ url_for('main.conceptos') }}"
               class="finance-btn-secondary">

                ← Volver

            </a>

        </div>

    </div>

    <!-- FORMULARIO -->

    <div class="card-modern p-4 p-lg-5">

        <form method="POST">

            <div class="form-section">

                <!-- HEADER -->

                <div class="section-header">

                    <div class="section-icon">

                        💳

                    </div>

                    <div>

                        <h4 class="section-title-modern">

                            Información del Concepto

                        </h4>

                        <p class="section-subtitle">

                            Datos financieros del nuevo concepto

                        </p>

                    </div>

                </div>

                <!-- NOMBRE -->

                <div class="mb-4">

                    <label class="form-label fw-semibold">

                        Nombre del Concepto

                    </label>

                    <input type="text"
                           name="nombre"
                           class="form-control modern-input"
                           placeholder="Ej: Inscripción, Convivencia..."
                           required>

                </div>

                <!-- VALOR -->

                <div class="mb-3">

                    <label class="form-label fw-semibold">

                        Valor

                    </label>

                    <input type="number"
                           name="valor"
                           class="form-control modern-input"
                           placeholder="$ Valor del concepto"
                           required>

                </div>

            </div>

            <!-- BOTONES -->

            <div class="form-actions">

                <button type="submit"
                        class="primary-action-btn">

                    <span class="action-icon">

                        💾

                    </span>

                    Guardar Concepto

                </button>

                <a href="{{ url_for('main.conceptos') }}"
                   class="secondary-action-btn">

                    <span class="action-icon">

                        ✖

                    </span>

                    Cancelar

                </a>

            </div>

        </form>

    </div>

</div>

</body>

</html>
