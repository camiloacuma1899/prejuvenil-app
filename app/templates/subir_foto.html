<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Subir Foto</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container mt-5">

    <div class="card-modern p-4">

        <h2 class="mb-4">

            📸 Nueva Fotografía

        </h2>

        <form method="POST"
              enctype="multipart/form-data">

            {{ form.hidden_tag() }}

            <div class="mb-3">

                {{ form.titulo.label }}

                {{ form.titulo(class="form-control") }}

            </div>

            <div class="mb-3">

                {{ form.archivo.label }}

                {{ form.archivo(class="form-control") }}

            </div>

            <button class="btn btn-modern btn-verde">

                Subir Foto

            </button>

            <a href="{{ url_for('main.galeria') }}"
               class="btn btn-modern btn-gris">

                Cancelar

            </a>

        </form>

    </div>

</div>

</body>

</html>
